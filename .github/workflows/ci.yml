name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Install linters
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: Format check
        run: |
          go fmt ./...
          golangci-lint --config=.golangci.yaml fmt ./... -v
          goimports -w -v .
          if git diff --exit-code; then
            echo "✅ Code is properly formatted"
          else
            echo "❌ Code format issues found"
            exit 1
          fi

      - name: Lint
        run: golangci-lint --config=.golangci.yaml run ./... -v

      - name: Run tests
        run: |
          PKGS=$(go list ./...)
          go test -race -coverpkg=$(echo $PKGS | tr ' ' ',') -coverprofile=coverage.out -covermode=atomic $PKGS
          go tool cover -func=coverage.out

      - name: Test charts module
        run: cd charts && go test -race ./...

      - name: Build
        run: |
          go build -v ./...
          (cd charts && go build -v ./...)
          (cd examples && go build -v ./...)

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
